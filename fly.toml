# Fly.io config for the BrandFactory API (Hono + WS on Node).
#
# Operators: update `app` and `primary_region` before first `fly deploy`.
# Secrets (DATABASE_URL, SUPABASE_*, OPENROUTER_API_KEY, CORS_ALLOWED_ORIGINS)
# are set via `fly secrets set`, not in this file.

app            = "brandfactory"
primary_region = "sin"
kill_signal    = "SIGINT"

[build]
  dockerfile = "packages/server/Dockerfile"

# Migrations run before new machines start serving. The migrate script
# uses `drizzle-orm/migrator` directly (not drizzle-kit) so we don't have
# to ship dev tooling in the runtime image; `migrationsFolder: './drizzle'`
# resolves relative to cwd, hence the cd into the db package.
[deploy]
  release_command = "sh -c 'cd node_modules/@brandfactory/db && node scripts/migrate.mjs'"

[http_service]
  internal_port        = 3001
  force_https          = true
  # Single-instance deploy — the `native-ws` realtime bus is in-process,
  # so scaling to 2+ Machines silently breaks cross-instance fan-out.
  # See docs/executing/hosted-deployment-plan.md Question 3.
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

[[http_service.checks]]
  method       = "GET"
  path         = "/health"
  interval     = "15s"
  grace_period = "10s"

# Non-secret defaults. Provider/runtime selection; all secret material
# lives in `fly secrets`.
[env]
  HOST              = "0.0.0.0"
  PORT              = "3001"
  LOG_LEVEL         = "info"
  AUTH_PROVIDER     = "supabase"
  STORAGE_PROVIDER  = "supabase"
  REALTIME_PROVIDER = "native-ws"
  LLM_PROVIDER      = "openrouter"
  LLM_MODEL         = "anthropic/claude-sonnet-4.6"

# Default Fly Machines ship at 256 MiB; that's tight for Node + tsx JIT +
# pg Pool + ws. 512 MiB gives headroom without committing to dedicated CPU.
[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "512mb"
